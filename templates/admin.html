<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Клиенты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">

<h1 class="mb-4">Панель администратора</h1>

<table class="table table-striped table-hover">

<tr>
    <th>ID</th>
    <th>Имя</th>
    <th>Телефон</th>
    <th>Дата</th>
    <th>Действие</th>
</tr>

{% for client in clients %}

<tr>

    <td>{{ client[0] }}</td>
    <td>{{ client[1] }}</td>
    <td>{{ client[2] }}</td>
    <td>{{ client[3] }}</td>
<td>

    <a href="/edit/{{ client[0] }}" class="btn btn-warning btn-sm">
        Редактировать
    </a>

    <a href="/delete/{{ client[0] }}" class="btn btn-danger btn-sm">
        Удалить
    </a>

</td>
</td>
</tr>

{% endfor %}

</table>
</div>
</body>
</html>
